<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* 不使用 @import 外部字体 — 防止加载失败导致空白 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    width: 390px;
    padding: 16px;
    /* 柔和渐变底色 */
    background: linear-gradient(165deg, #e8ecf4 0%, #f2eff6 35%, #eef0f8 65%, #f5f0ee 100%);
    min-height: 100px;
  }

  .card {
    border-radius: 28px;
    overflow: hidden;
    /* 毛玻璃卡片 */
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(60px) saturate(160%);
    -webkit-backdrop-filter: blur(60px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.04),
      0 1px 2px rgba(0,0,0,0.03),
      inset 0 1px 0 rgba(255,255,255,0.5);
  }

  /* 顶部 */
  .header {
    padding: 26px 22px 18px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }
  .project-name {
    font-size: 19px;
    font-weight: 800;
    color: #2c2c2e;
    letter-spacing: -0.4px;
  }
  .logo-badge {
    font-size: 9px;
    font-weight: 700;
    color: #a0a0a8;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .logo-icon {
    width: 15px;
    height: 15px;
    background: linear-gradient(135deg, #8da4c8, #a78bbe);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 8px;
    font-weight: 900;
  }
  .header-date {
    font-size: 12px;
    color: #a0a0a8;
    font-weight: 500;
  }

  /* 统计行 */
  .stats-row {
    display: flex;
    gap: 8px;
    padding: 2px 22px 16px;
  }
  .stat {
    flex: 1;
    /* 毛玻璃子卡 */
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-number {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .stat-number.blue { color: #7b9ec5; }
  .stat-number.red { color: #c47d76; }
  .stat-label {
    font-size: 10px;
    color: #a0a0a8;
    font-weight: 600;
    margin-top: 1px;
    letter-spacing: 0.2px;
  }

  /* 对比条 */
  .chart-section {
    padding: 4px 22px 18px;
  }
  .chart-title {
    font-size: 10px;
    font-weight: 700;
    color: #a0a0a8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .bar-group {
    margin-bottom: 14px;
  }
  .bar-label {
    font-size: 11px;
    color: #a0a0a8;
    font-weight: 600;
    margin-bottom: 5px;
  }
  .bar-track {
    height: 34px;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(0,0,0,0.03);
  }
  .bar-fill-orig {
    height: 100%;
    background: linear-gradient(90deg, #8da4c8, #a8c0df);
    border-radius: 12px;
    width: 56%;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .bar-actual-track {
    height: 34px;
    display: flex;
    border-radius: 12px;
    overflow: hidden;
  }
  .seg {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }
  .seg-base {
    background: linear-gradient(90deg, #8da4c8, #a3b8d4);
    flex: 15;
  }
  .seg-c1 {
    background: #c47d76;
    flex: 4;
  }
  .seg-c2 {
    background: #c9a06c;
    flex: 2;
  }
  .seg-c3 {
    background: #9e85b5;
    flex: 3;
  }

  /* 标注 */
  .annotations {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 14px;
  }
  .anno {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .anno-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .anno-text {
    font-size: 11px;
    color: #6c6c70;
    font-weight: 500;
    flex: 1;
  }
  .anno-days {
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* 底部结论 */
  .verdict-section {
    margin: 14px 22px 0;
    padding: 16px;
    /* 半透明结论卡 */
    background: rgba(196, 125, 118, 0.08);
    border: 1px solid rgba(196, 125, 118, 0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 18px;
    text-align: center;
  }
  .verdict-big {
    font-size: 26px;
    font-weight: 900;
    color: #c47d76;
    letter-spacing: -0.5px;
  }
  .verdict-sub {
    font-size: 11px;
    color: #a0a0a8;
    font-weight: 500;
    margin-top: 3px;
  }
  .verdict-line {
    font-size: 12px;
    font-weight: 700;
    color: #c47d76;
    margin-top: 6px;
  }

  .footer {
    padding: 14px 22px 22px;
    text-align: center;
  }
  .footer-text {
    font-size: 9px;
    color: #c7c7cc;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="header-top">
      <div class="project-name">CRM 系统重构</div>
      <div class="logo-badge">
        <div class="logo-icon">S</div>
        SCOPE SHIELD
      </div>
    </div>
    <div class="header-date">2026年3月1日立项 · 截至 3月24日</div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-number blue">15天</div>
      <div class="stat-label">原始工期</div>
    </div>
    <div class="stat">
      <div class="stat-number red">24天</div>
      <div class="stat-label">当前工期</div>
    </div>
    <div class="stat">
      <div class="stat-number red">+60%</div>
      <div class="stat-label">膨胀率</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-title">工期对比</div>

    <div class="bar-group">
      <div class="bar-label">原始计划</div>
      <div class="bar-track">
        <div class="bar-fill-orig">15 天</div>
      </div>
    </div>

    <div class="bar-group">
      <div class="bar-label">实际工期</div>
      <div class="bar-actual-track">
        <div class="seg seg-base">15天</div>
        <div class="seg seg-c1">+4</div>
        <div class="seg seg-c2">+2</div>
        <div class="seg seg-c3">+3</div>
      </div>
    </div>

    <div class="annotations">
      <div class="anno">
        <div class="anno-dot" style="background:#c47d76;"></div>
        <div class="anno-text">3.8 · 产品经理 · 需求A范围扩大</div>
        <div class="anno-days" style="color:#c47d76;">+4 天</div>
      </div>
      <div class="anno">
        <div class="anno-dot" style="background:#c9a06c;"></div>
        <div class="anno-text">3.12 · 产品经理 · UI 推翻重做</div>
        <div class="anno-days" style="color:#c9a06c;">+2 天</div>
      </div>
      <div class="anno">
        <div class="anno-dot" style="background:#9e85b5;"></div>
        <div class="anno-text">3.18 · 领导 · 新增数据大屏</div>
        <div class="anno-days" style="color:#9e85b5;">+3 天</div>
      </div>
    </div>
  </div>

  <div class="verdict-section">
    <div class="verdict-big">延期 9 天</div>
    <div class="verdict-sub">3 次需求变更 · 2 位需求方</div>
    <div class="verdict-line">100% 来自需求变更 · 0 天来自开发</div>
  </div>

  <div class="footer">
    <div class="footer-text">SCOPE SHIELD · 工期保险箱</div>
  </div>
</div>

</body>
</html>
